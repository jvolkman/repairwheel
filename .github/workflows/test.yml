name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  matrix-test:
    name: Unit tests - Python ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform == 'alpine' && 'ubuntu-latest' || format('{0}-latest', matrix.platform) }}
    container: ${{ matrix.platform == 'alpine' && 'alpine:latest' || '' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu, windows, macos, alpine]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          # Hatch's standalone Python 3.10 needs PYTHONHOME to find its
          # stdlib, but venv strips it — making venv-based tests impossible.
          - platform: alpine
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.platform != 'alpine'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Alpine)
        if: matrix.platform == 'alpine'
        run: apk add --no-cache python3 python3-dev py3-pip gcc musl-dev bzip2-dev gcompat

      - name: Ensure latest pip
        run: python -m pip install --break-system-packages --upgrade pip

      - name: Install Hatch
        run: python -m pip install --break-system-packages hatch

      - name: Install system test dependencies (Linux Glibc)
        if: matrix.platform == 'ubuntu'
        run: sudo apt-get update && sudo apt-get install -y libbz2-dev

      - name: Run tests
        run: hatch env run -e test.py${{ matrix.python-version }} test

  generate:
    name: Gen - Python ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform == 'alpine' && 'ubuntu-latest' || format('{0}-latest', matrix.platform) }}
    container: ${{ matrix.platform == 'alpine' && 'alpine:latest' || '' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu, windows, macos, alpine]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.platform != 'alpine'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Alpine)
        if: matrix.platform == 'alpine'
        run: apk add --no-cache python3 python3-dev py3-pip gcc musl-dev bzip2-dev gcompat

      - name: Ensure latest pip
        run: python -m pip install --break-system-packages --upgrade pip

      - name: Install Hatch
        run: python -m pip install --break-system-packages hatch

      - name: Generate patched wheels
        env:
          TESTWHEEL_GENERATE_PATH: ${{ runner.temp }}/testwheel-out/${{ matrix.python-version }}/${{ matrix.platform }}${{ matrix.platform == 'alpine' && '-musl' || '' }}
        run: hatch env run -e test.py${{ matrix.python-version }} generate

      - uses: actions/upload-artifact@v7
        with:
          name: patched-testwheel-${{ matrix.platform }}-${{ matrix.python-version }}${{ matrix.platform == 'alpine' && '-musl' || '' }}
          path: ${{ runner.temp }}/testwheel-out

  check:
    name: Check - Python ${{ matrix.python-version }} on ${{ matrix.platform }}
    needs: generate
    runs-on: ${{ matrix.platform == 'alpine' && 'ubuntu-latest' || format('{0}-latest', matrix.platform) }}
    container: ${{ matrix.platform == 'alpine' && 'alpine:latest' || '' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu, windows, macos, alpine]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.platform != 'alpine'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Alpine)
        if: matrix.platform == 'alpine'
        run: apk add --no-cache python3 python3-dev py3-pip gcc musl-dev bzip2-dev gcompat

      - name: Ensure latest pip
        run: python -m pip install --break-system-packages --upgrade pip

      - name: Install Hatch
        run: python -m pip install --break-system-packages hatch

      - uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/testwheel-out

      - name: Check wheels
        env:
          TESTWHEEL_GENERATE_PATH: ${{ runner.temp }}/testwheel-out/
        run: hatch env run -e test.py${{ matrix.python-version }} check
